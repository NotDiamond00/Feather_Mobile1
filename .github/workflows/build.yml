name: Build Feather Mobile
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Find and build
        run: |
          # Find wherever build.gradle actually is
          BUILD_DIR=$(find . -name "build.gradle" | head -1 | xargs dirname)
          echo "Found build.gradle in: $BUILD_DIR"
          cd "$BUILD_DIR"
          gradle build

      - uses: actions/upload-artifact@v4
        with:
          name: feather-mobile
          path: "**/build/libs/*.jar"
